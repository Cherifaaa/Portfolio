  <style>
          /* Dossier cartes (empilement) */
          .cartes-folder {
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-bottom: 30px;
            margin-right: 40px;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 180px;
            height: 240px;
            position: relative;
            align-self: flex-start;
            background: none;
            border-radius: 0;
            box-shadow: none;
            z-index: 1;
          }
          .cartes-folder:hover {
            transform: scale(1.05);
            box-shadow: none;
            background: none;
            z-index: 2;
          }
          .cartes-folder-stack {
            position: relative;
            width: 180px;
            height: 240px;
            pointer-events: none;
          }
          .cartes-folder-stack img {
            position: absolute;
            width: 180px;
            height: 240px;
            border-radius: 12px;
            pointer-events: none;
            transition: filter 0.2s;
            background: none !important;
            border: none !important;
          }
          .cartes-folder-stack img:nth-child(2) {
            left: 16px; top: 12px; opacity: 0.7; z-index: 2;
          }
          .cartes-folder-stack img:nth-child(3) {
            left: 32px; top: 24px; opacity: 0.5; z-index: 1;
          }
          .cartes-folder-stack img:nth-child(1) {
            left: 0; top: 0; z-index: 3;
          }
        
        #cartes-gallery {
          display: none;
          grid-template-columns: repeat(2, 1fr);
          gap: 20px;
          justify-items: center;
          align-items: flex-start;
          padding: 30px 0 0 0;
        }
        #cartes-gallery .gallery-carte {
          width: 100%;
          max-width: 250px;
          height: auto;
          border-radius: 10px;
          object-fit: cover;
          background: none !important;
          transition: transform 0.3s ease, box-shadow 0.3s ease;
          margin-bottom: 0;
          cursor: pointer;
          box-shadow: none !important;
          display: block;
        }
        #cartes-gallery .gallery-carte:hover {
          transform: scale(1.05);
          box-shadow: 0 10px 25px rgba(255, 255, 255, 0.15);
        }
      /* Amélioration de l'affichage des cartes */
      #cartes-gallery {
        gap: 32px !important;
        padding: 30px 0 0 0;
        justify-content: center;
        align-items: flex-start;
      }
      #cartes-gallery .carte-originale {
        margin: 0 8px 32px 8px;

        border-radius: 12px;
        box-shadow: 0 4px 16px #0004;
        padding: 8px;
        display: block;
        transition: transform 0.2s;
        max-width: 100%;
        height: auto;
      }
      #cartes-gallery .carte-originale:hover {
        transform: scale(1.04) rotate(-1deg);
        border-color: #ff5555;
        z-index: 2;
      }
    .switch-container {
      position: relative;
      display: flex;
      justify-content: space-between;
      background: #141414;
      border-radius: 50px;
      padding: 5px;
      width: 450px;
      margin: 40px auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .switch-btn {
      flex: 1;
      padding: 10px 20px;
      background: transparent;
      color: white;
      border: none;
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      z-index: 2;
      position: relative;
    }

    .slider-bg {
      position: absolute;
      top: 5px;
      bottom: 5px;
      width: 33.33%;
      border-radius: 50px;
      background: linear-gradient(135deg, #530000, #220000);
      transition: all 0.3s ease;
      z-index: 1;
    }

    .switch-btn.active {
      color: white;
    }

    .gallery-section {
      display: none;
      padding: 20px 5%;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .gallery-section.active {
      display: flex;
    }

    .gallery-section img {
      max-width: 250px;

    .gallery-section img:hover {
  transform: scale(1.05);

}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(15, 15, 15, 0.9);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 3000;
}

.lightbox img {
  width: auto;
  height: auto;
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 10px;
  box-shadow: 0 0 25px rgba(0,0,0,0.7);
}


.lightbox-title {
  margin-top: 20px;
  color: white;
  font-size: 1.2rem;
  font-family: 'Orbitron', sans-serif;
}

.lightbox-nav {
  position: absolute;
  top: 50%;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 0 40px;
  transform: translateY(-50%);
}

.lightbox-nav button {
  background: none;
  border: none;
  color: white;
  font-size: 2rem;
  cursor: pointer;
  transition: color 0.2s;
}

.lightbox-nav button:hover {
  color: #ff5555;
}

.lightbox-close {
  position: absolute;
  top: 20px;
  right: 30px;
  color: white;
  font-size: 2rem;
  cursor: pointer;
}

/* Responsive Galerie pour mobile */
@media screen and (max-width: 600px) {
  #cartes-gallery .gallery-carte {
    max-width: 140px !important;
    width: 100% !important;
  }
  /* Pour la galerie active : 2 colonnes */
  .gallery-section.active {
    display: grid !important; /* forcer display grid en mobile */
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    justify-items: center;
    padding: 10px 5%;
  }

  /* Les autres sections doivent rester cachées */
  .gallery-section:not(.active) {
    display: none !important;
  }

  /* Images de toutes les galeries, y compris digital et cartes */
  .gallery-section img,
  #cartes-gallery .gallery-carte {
    width: 100%;
    max-width: 100%;
    border-radius: 8px;
    height: auto;
    object-fit: cover;
    margin: 0;
    box-shadow: none;
    background: none;
  }

  /* Dossier cartes (empilement) version mobile : centré, plus petit */
  .cartes-folder, .cartes-folder-stack {
    width: 110px !important;
    height: 150px !important;
    margin: 0 auto 18px auto !important;
    align-self: center !important;
  }
  .cartes-folder-stack img {
    width: 110px !important;
    height: 150px !important;
    border-radius: 8px !important;
  }
}
@media screen and (max-width: 600px) {
  .lightbox-nav {
    display: none !important;
  }
}

@media screen and (min-width: 501px) {
  .lightbox-nav {
    display: flex !important; /* ou ce que tu avais avant */
  }
}

@media screen and (max-width: 600px) {
  
  /* Switch container : réduire largeur et passer en 100% avec padding */
  .switch-container {

}

  <script>
    
    const buttons = document.querySelectorAll('.switch-btn');
    const slider = document.getElementById('slider');
    const sections = document.querySelectorAll('.gallery-section');

    buttons.forEach((btn, index) => {
      btn.addEventListener('click', () => {
        // Retirer la classe active de tous les boutons
        buttons.forEach(b => b.classList.remove('active'));
        // Ajouter la classe active au bouton cliqué
        btn.classList.add('active');

        // Déplacer le curseur en fonction du bouton cliqué
        slider.style.left = `${index * 33.33}%`;

        // Afficher la section correspondante et masquer les autres
        sections.forEach(section => {
          section.classList.remove('active');
          section.style.display = 'none';
        });
        const activeSection = document.getElementById(btn.dataset.category);
        activeSection.classList.add('active');
        // Applique le bon display selon la largeur d'écran
        if (window.innerWidth <= 600) {
          activeSection.style.display = 'grid';
        } else {
          activeSection.style.display = 'flex';
        }
      });
    });

    // Activer la section Digital si hash #digital
    if (window.location.hash === '#digital') {
      buttons.forEach(b => b.classList.remove('active'));
      sections.forEach(section => section.classList.remove('active'));
      document.querySelector('.switch-btn[data-category="digital"]').classList.add('active');
      document.getElementById('digital').classList.add('active');
      slider.style.left = '33.33%';
    }

    // Correction affichage mobile/desktop au chargement et au resize
    function fixGalleryDisplay() {
      const activeSection = document.querySelector('.gallery-section.active');
      if (activeSection) {
        if (window.innerWidth <= 600) {
          activeSection.style.display = 'grid';
        } else {
          activeSection.style.display = 'flex';
        }
      }
    }
    window.addEventListener('DOMContentLoaded', fixGalleryDisplay);
    window.addEventListener('resize', fixGalleryDisplay);



    // COEUR
    const heartBtn = document.getElementById("heart-btn");
    let isLiked = false;
    if(heartBtn){
      heartBtn.addEventListener("click", function () {
          isLiked = !isLiked;
          heartBtn.src = isLiked ? "Images/coeur2.png" : "Images/coeur1.png";
      });
    }

    // --- Cartes dossier galerie ---
    const cartesFolder = document.getElementById("cartes-folder");
    const cartesGallery = document.getElementById("cartes-gallery");
    const cartesBack = document.getElementById("cartes-back");
    // Ne pas cacher la galerie cartes au chargement, elle est déjà masquée par défaut en CSS
    if(cartesFolder && cartesGallery && cartesBack){
      cartesFolder.addEventListener("click", function(){
        cartesGallery.style.display = "flex";
        document.body.style.overflow = "hidden";
      });
      cartesBack.addEventListener("click", function(e){
        e.stopPropagation();
        cartesGallery.style.display = "none";
        document.body.style.overflow = "";
      });
    }

// LIGHTBOX
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const lightboxTitle = document.getElementById("lightbox-title");
const closeBtn = document.getElementById("lightbox-close");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

let currentImages = [];
let currentIndex = 0;

// Attach lightbox click to all gallery images (sections)
function setupLightboxListeners() {
  const allGalleryImgs = document.querySelectorAll(".gallery-section img");
  allGalleryImgs.forEach((img) => {
    img.onclick = function() {
      let parentGallery = img.closest(".gallery-section");
      currentImages = Array.from(parentGallery.querySelectorAll("img"));
      currentIndex = currentImages.indexOf(img);
      openLightbox();
    };
  });
}
setupLightboxListeners();

// Event delegation for cartes-gallery overlay (cards) -- robust version
document.addEventListener("click", function(e) {
  const card = e.target.closest('.gallery-carte');
  if (card && document.getElementById('cartes-gallery').style.display !== 'none') {
    let parentGallery = document.getElementById('cartes-gallery');
    currentImages = Array.from(parentGallery.querySelectorAll(".gallery-carte"));
    currentIndex = currentImages.indexOf(card);
    openLightbox();
  }
});

if (cartesFolder && cartesGallery && cartesBack) {
  cartesFolder.addEventListener("click", function(){
    cartesGallery.style.display = "flex";
    document.body.style.overflow = "hidden";
  });
  cartesBack.addEventListener("click", function(e){
    e.stopPropagation();
    cartesGallery.style.display = "none";
    document.body.style.overflow = "";
  });
}

function openLightbox() {
  const img = currentImages[currentIndex];
  lightboxImg.src = img.src;
  lightboxTitle.textContent = img.dataset.title || img.alt || "";
  lightbox.style.display = "flex";
}

function closeLightbox() {
  lightbox.style.display = "none";
}

function showNext() {
  currentIndex = (currentIndex + 1) % currentImages.length;
  openLightbox();
}

function showPrev() {
  currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
  openLightbox();
}

closeBtn.addEventListener("click", closeLightbox);

// ** Garde ces deux événements pour que les flèches fonctionnent **
prevBtn.addEventListener("click", showPrev);
nextBtn.addEventListener("click", showNext);

// Gestion du swipe tactile et souris sur l’image lightbox
let touchStartX = 0;
let touchEndX = 0;

lightboxImg.addEventListener("touchstart", (e) => {
  touchStartX = e.changedTouches[0].screenX;
});

lightboxImg.addEventListener("touchend", (e) => {
  touchEndX = e.changedTouches[0].screenX;
  handleSwipe();
});

lightboxImg.addEventListener("mousedown", (e) => {
  touchStartX = e.screenX;
});

lightboxImg.addEventListener("mouseup", (e) => {
  touchEndX = e.screenX;
  handleSwipe();
});

function handleSwipe() {
  const swipeDistance = touchEndX - touchStartX;
  const threshold = 50; // distance minimale pour valider swipe
  if (swipeDistance > threshold) {
    showPrev();
  } else if (swipeDistance < -threshold) {
    showNext();
  }
}


  // Option: fermer en cliquant en dehors de l’image
  lightbox.addEventListener("click", function (e) {
    if (e.target === lightbox) closeLightbox();
  });
  
</script>
