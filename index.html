<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            overflow:hidden;
            background:black;
            width:100vw;
            height:100vh;
        }

        video{
            position:fixed;
            top:0;
            left:0;
            width:100vw;
            height:100vh;
            object-fit:cover;
            transition:opacity 0.6s ease;
            z-index:-1;
        }

        #introVideo1{ opacity:1; }
        #introVideo2{ opacity:0; }

        /* 🎯 LOGO */
        #logoVideo{
            background: transparent;
            position:fixed;
            left:7px;              /* milieu gauche */
            top:35%;
            transform:translateY(-50%);
            width:720px;
            height:auto;
            z-index:1000;

            opacity:0;
            transition:opacity 0.6s ease;
            pointer-events:none;
        }

        #logoVideo.show{
            opacity:1;
        }

/* ===================== */
/* WRAP BOUTON */
/* ===================== */
#enterWrap{
    position:fixed;
    left:200px;
    bottom:40px;
    width:350px;
    z-index:1000;
    position:fixed;
}

/* bouton */
#enterBtn{
    width:100%;
    height:auto;

    opacity:0;
    pointer-events:none;

    transform:translateY(20px);
    transition:opacity 1.2s ease, transform 1.2s ease;

    cursor:url("./Images/crosshair2.png") 17 17, pointer;
}

#enterBtn.show{
    opacity:1;
    pointer-events:auto;
    transform:translateY(0);
}

/* ===================== */
/* SKULL COLLÉ COIN HAUT GAUCHE */
/* ===================== */
#skullVideo{
    position:absolute;
    top: 88px;
  left: 45px;

    width:90px;
    height:auto;

    transform:translate(-40%, -60%) rotate(-15deg);
   z-index:1000000 !important;

    opacity:0;
    pointer-events:none;

    transition:opacity 0.4s ease, transform 0.6s ease;
}

#skullVideo.show{
    opacity:1;
    transform:translate(-40%, -80%) rotate(-10deg);
}

/* ===================== */
/* ANIMATION BITE (CROQUE PAGE) */
/* ===================== */
#skullVideo.bite{
    opacity:1 !important;
    position:fixed;
    left:0;
    top:0;

    transform-origin: center;
    animation: biteZoomClean 1.2s ease-in forwards;
    z-index:1000000 !important;
    will-change: transform;
}
#skullVideo.zoom {
    position: fixed;
    animation: skullZoom 2.8s ease-in forwards;
    transform-origin: center;
    will-change: transform, opacity;
}

@keyframes skullZoom {
    0% {
        transform: translate(var(--x), var(--y)) scale(1) rotate(-15deg);
        opacity: 1;
    }

    30% {
        transform: translate(var(--x), calc(var(--y) - 40px)) scale(2) rotate(10deg);
        opacity: 1;
    }

    100% {
        transform: translate(0vw, -180vh) scale(220);
        opacity: 0;
    }
}
#transitionOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    z-index:999998;
    pointer-events:none;
}

#skullVideo{
    z-index:1000000; /* IMPORTANT : skull au-dessus de tout */
}


@keyframes skullZoomFull {
    0% {
        transform: translate(0, 0) scale(1) rotate(-15deg);
        opacity: 1;
    }

    50% {
        transform: translate(0, -50px) scale(2) rotate(10deg);
        opacity: 1;
    }

    100% {
        transform: translate(0, -120vh) scale(220);
        opacity: 0;
    }
}
/* INDEX */


#blackCover{
    position:fixed;
    inset:0;
    background:black;
    opacity:0;
    pointer-events:none;
    transition: none;

    z-index:999999; /* AU-DESSUS DU SITE */
}
#blackCover.show{
    opacity:1;
}
.hidden {
    opacity: 0 !important;
    pointer-events: none !important;
transition: none;
}

@keyframes biteZoomClean{
    0%{
        transform: translate(var(--x), var(--y)) translateY(0px) scale(1) rotate(-15deg);
    }

    40%{
        transform: translate(var(--x), var(--y)) translateY(-20px) scale(2) rotate(10deg);
    }
/* taille skull zoomer */
    100%{
        transform: translate(25vw, -260vh) translateY(-120px) scale(90);
    }
}
@keyframes biteZoomStep2{
    0%{
        transform: translate(25vw, -260vh) translateY(-120px) scale(90);
        opacity:1;
    }

    100%{
        transform: translate(25vw, -460vh) translateY(-120px) scale(160);
        opacity:0;
    }
}
@keyframes biteZoomFromPos{
    0%{
        transform:translate(-40%, -60%) rotate(-15deg) scale(1);
    }

    40%{
        transform:translate(-40%, -60%) rotate(10deg) scale(2);
    }

    100%{
        transform:translate(-50%, -50%) scale(30);
        position:fixed;
        top:50%;
        left:50%;
    }
}

        .star-trail{
            position:fixed;
            pointer-events:none;
            z-index:99999;
            font-size:18px;
            line-height:1;
            user-select:none;
            transform:translate(-50%, -50%);
        }

        body {
            cursor: url("./Images/mouse.png") 4 4, auto;
        }

        a,
        button {
            cursor: url("./Images/crosshair2.png") 25 25, pointer !important;
        }


        #loader{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999999;
}

.spinner{
    width:60px;
    height:60px;
    border:4px solid rgba(255,255,255,0.2);
    border-top:4px solid #ff2fa5;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

#loader.hide{
    opacity:0;
    pointer-events:none;
    transition:0.5s ease;
}
    </style>
</head>

<body>
<div id="loader">
    <div class="spinner"></div>
</div>
    <!-- INTRO -->
    <video id="introVideo1" muted playsinline preload="auto">
        <source src="Videos/Sequence1.webm" type="video/webm">
    </video>

    <!-- LOOP -->
    <video id="introVideo2" muted playsinline preload="auto" loop>
        <source src="Videos/Sequence2.webm" type="video/webm">
    </video>

<!-- LOGO -->
<video id="logoVideo" muted playsinline preload="auto" >
    <source src="Videos/logo_2.webm" type="video/webm">
</video>

    <!-- BOUTON -->
<div id="enterWrap">

    <video id="skullVideo" muted playsinline preload="auto">
        <source src="Videos/skulll.webm" type="video/webm">
    </video>

    <img id="enterBtn" src="Images/bouton.png" alt="Entrer dans le Portfolio">

</div>

<script>
const isMobile = window.innerWidth <= 768;

if (isMobile) {
    window.location.replace("dep.html");
}

/* =========================
   LOADER
========================= */

/* =========================
   VIDEOS
========================= */
const v1 = document.getElementById("introVideo1");
const v2 = document.getElementById("introVideo2");
const logo = document.getElementById("logoVideo");
const btn = document.getElementById("enterBtn");
const skull = document.getElementById("skullVideo");
const wrap = document.getElementById("enterWrap");

let introStarted = false;

function startIntro() {
    if (introStarted) return;
    introStarted = true;

    const loader = document.getElementById("loader");
    if (loader) {
        loader.classList.add("hide");
        v1.currentTime = 0;
v1.play();
        setTimeout(() => loader.remove(), 500);
    }

    setTimeout(runIntro, 300); // petit buffer sécurité
}

function forceStart() {
    startIntro();
}

Promise.all([
    document.getElementById("introVideo1").readyState >= 2,
    document.getElementById("introVideo2").readyState >= 2,
    document.getElementById("logoVideo").readyState >= 2,
    document.getElementById("skullVideo").readyState >= 2
]);

window.addEventListener("load", () => {
    setTimeout(startIntro, 800);
});
/* =========================
   INTRO
========================= */
let biteStart = null;

function runIntro(){

/* bouton + logo */
if (!isMobile) {
setTimeout(() => {

logo.classList.add("show");

logo.pause();
logo.currentTime = 0;

requestAnimationFrame(() => {
    logo.play().catch(() => {});
});

    setTimeout(() => {
        btn.classList.add("show");
        skull.classList.add("show");
    }, 2000);

}, 6200);

logo.addEventListener("ended", () => {
    logo.pause();
    logo.currentTime = logo.duration - 0.01;
});
}

/* transition vidéo */
v1.addEventListener("ended", () => {
    v2.currentTime = 0;
    v2.play();
    v2.style.opacity = "1";
    v1.style.opacity = "0";
});

function checkBite() {

    const t = (performance.now() - biteStart) / 1000;

    if (t > 2 && !window.uiHidden) {
        window.uiHidden = true;
        logo.style.transition = "none";
        btn.style.transition = "none";
        logo.style.opacity = "0";
        btn.style.opacity = "0";
    }

    if (t > 2 && !window.blackOn) {
        window.blackOn = true;
        document.getElementById("blackCover").style.opacity = "1";
    }

    if (t > 2.3 && !window.skullLaunched) {
        window.skullLaunched = true;

        skull.style.animation = "biteZoomClean 1.2s ease-in forwards";

        setTimeout(() => {
            skull.style.animationPlayState = "paused";

            setTimeout(() => {
                skull.style.animation = "biteZoomStep2 0.80s ease-in forwards";
            }, 10);

        }, 50);
    }

    if (t > 2.4 && !window.redirected) {
        window.redirected = true;

        const black = document.getElementById("blackCover");
        black.classList.add("show");

        setTimeout(() => {
            document.body.style.opacity = "0";
            document.body.style.transition = "opacity 0.6s ease";

            setTimeout(() => {
                window.location.href = "dep.html";
            }, 600);

        }, 1200);

        return;
    }

    requestAnimationFrame(checkBite);
}

btn.addEventListener("click", () => {

    if (window.lock) return;
    window.lock = true;

    btn.style.pointerEvents = "none";

    const rect = skull.getBoundingClientRect();

    skull.style.position = "fixed";
    skull.style.left = rect.left + "px";
    skull.style.top = rect.top + "px";

    skull.style.setProperty("--x", "0px");
    skull.style.setProperty("--y", "0px");

skull.pause();
skull.currentTime = 0;

const playPromise = skull.play();
    if (playPromise) playPromise.catch(() => {});

    skull.classList.add("bite");
    document.getElementById("blackCover").style.zIndex = "1";
    skull.style.zIndex = "1000000";

    biteStart = performance.now();
    requestAnimationFrame(checkBite);
});

/* =========================
   TRAÎNÉE ÉTOILE
========================= */
const stars = [];
const STAR_COUNT = 30;

let mouseX = innerWidth / 2;
let mouseY = innerHeight / 2;
let lastMoveTime = Date.now();

document.addEventListener("mousemove", (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    lastMoveTime = Date.now();

    stars.forEach(s => s.el.style.opacity = "1");
});

for (let i = 0; i < STAR_COUNT; i++) {

    const el = document.createElement("div");
    el.innerHTML = "★";

    el.style.position = "fixed";
    el.style.pointerEvents = "none";
    el.style.zIndex = "99999";
    el.style.fontSize = (34 - i * 0.5) + "px";
    el.style.color = "#ff4db8";
    el.style.textShadow = "0 0 10px #ff4db8, 0 0 20px #ff1493";
    el.style.transform = "translate(-50%, -50%)";
    el.style.transition = "opacity 0.25s ease";

    document.body.appendChild(el);

    stars.push({ el, x: mouseX, y: mouseY });
}

function animate() {

    const idleTime = Date.now() - lastMoveTime;
    const idleProgress = Math.min(idleTime / 600, 1);

    let x = mouseX;
    let y = mouseY;

    stars.forEach((s, i) => {

        s.x += (x - s.x) * 0.25;
        s.y += (y - s.y) * 0.25;

        s.el.style.left = s.x + "px";
        s.el.style.top = s.y + "px";

        const baseOpacity = (1 - i / STAR_COUNT) * 0.9;
        const fadeOut = 1 - idleProgress;

        s.el.style.opacity = baseOpacity * fadeOut;

        const scale = 1 - (i / STAR_COUNT) * 0.7;

        s.el.style.transform =
            `translate(-50%, -50%) scale(${scale})`;

        x = s.x;
        y = s.y;
    });

    requestAnimationFrame(animate);
}

logo.addEventListener("ended", () => {
    logo.pause();
    logo.currentTime = logo.duration;
});

animate();

}
</script>
<div id="blackCover"></div>

</body>

</html>
