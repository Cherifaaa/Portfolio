html{
    scroll-behavior:smooth;
    background:#000;
}

body {

    cursor: url("./Images/mouse.png") 4 4, auto;

    overflow-x: hidden;

    background: linear-gradient(
        180deg,
        #000000 0%,
        #a41a61 15%,
        #ff1097 40%,
        #ff2fa5 70%,
        #4e1330 100%
    );

    background-repeat: no-repeat;
    background-attachment: scroll;

    color: var(--white-color);
}

/* écran noir overlay */
#fadeBlack {
    position: fixed;
    inset: 0;
    background: black;
    z-index: 999999;

    opacity: 1;
    pointer-events: none;

    /* 🔥 plus doux + plus ciné */
    transition: opacity 2.2s cubic-bezier(0.76, 0, 0.24, 1);
}
#fadeBlack::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(
        circle at center,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,0.85) 60%,
        rgba(0,0,0,0) 100%
    );
    opacity: 0.6;
}
/* disparition */
#fadeBlack.hide {
    opacity: 0;
}

#circle-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
}

/* cercle */
.circle {
    position: absolute;
    border-radius: 50%;

    /* ❌ plus de remplissage */
    background: transparent;

    /* ✅ juste un contour */
    border: 5px solid rgba(255, 255, 255, 1.45);

    transform: scale(0);
    opacity: 0;

    animation: popIn 2.5s ease-out forwards;
}

@keyframes popIn {
    0% {
        transform: scale(0);
        opacity: 0;
    }
    50% {
        opacity: 0.4;
    }
    100% {
        transform: scale(1);
        opacity: 0;
    }
}

.game-section {

.game-section.video-right {

      position: relative;
      cursor: pointer;
      max-width: 600px;
    }

    .video-wrapper video {
      width: 100%;
      border-radius: 10px;
    }

    /* LIGHTBOX */
    .video-lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .video-lightbox video {
      max-width: 90%;
      max-height: 80%;
      border: 2px solid #fff;
      border-radius: 10px;
    }

    .close-lightbox {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 2em;
      color: white;
      cursor: pointer;
    }

    .video-wrapper img.video-thumbnail {
  width: 70%;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.3s ease;
}

.video-wrapper img.video-thumbnail:hover {

}
/* MENU BURGER RESPONSIVE */
@media screen and (max-width: 900px) {
-index: 999;

}

  <!-- LIGHTBOX VIDEO PLAYER -->
  <div class="video-lightbox" id="video-lightbox">

    <video id="lightbox-video" controls autoplay></video>
  </div>

  <script>
const bar = document.querySelector('.bars');
const menu = document.querySelector('.menu');

bar.addEventListener('click', () => {
  menu.classList.toggle('show_menu');
});

    const lightbox = document.getElementById('video-lightbox');
    const lightboxVideo = document.getElementById('lightbox-video');
    const closeBtn = document.getElementById('close-video');

    document.querySelectorAll('.video-wrapper').forEach(wrapper => {
      wrapper.addEventListener('click', () => {
        const src = wrapper.getAttribute('data-video');
        lightboxVideo.src = src;
        lightbox.style.display = 'flex';
      });
    });

    closeBtn.addEventListener('click', () => {
      lightboxVideo.pause();
      lightbox.style.display = 'none';
    });

    // Optional: click outside to close
    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) {
        lightboxVideo.pause();
        lightbox.style.display = 'none';
      }
    });
    document.addEventListener("DOMContentLoaded", function () {
            const heartBtn = document.getElementById("heart-btn");
            let isLiked = false;
    
            heartBtn.addEventListener("click", function () {
                isLiked = !isLiked;
                heartBtn.src = isLiked ? "Images/coeur2.png" : "Images/coeur1.png";
            });
        });

window.addEventListener("load", () => {
    requestAnimationFrame(() => {
        document.getElementById("fadeBlack").classList.add("hide");
    });
});


function createCircle() {
    const circle = document.createElement("div");
    circle.classList.add("circle");

    const size = Math.random() * 120 + 20; // 20px → 140px

    circle.style.width = size + "px";
    circle.style.height = size + "px";

    circle.style.left = Math.random() * 100 + "vw";
    circle.style.top = Math.random() * 100 + "vh";

    document.getElementById("circle-layer").appendChild(circle);

    // supprime après animation
    setTimeout(() => {
        circle.remove();
    }, 3000);
}

// spawn en continu
setInterval(createCircle, 400);

</script>
